# 版本历史
# ============================================================================
# V1.0 (2026-03-25): 初始版本，7维度评分体系
# V1.1 (2026-03-26): 升级为8维度评分体系
#   - 新增 knowledge_reference（知识点引用）维度
#   - 新增 reverse_feedback（逆向反馈）维度
#   - 移除 knowledge_consistency 维度（合并到 knowledge_reference）
