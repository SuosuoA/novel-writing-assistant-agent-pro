# 评分权重配置文件
# 
# 版本: V1.1（8维度评分体系）
# 创建日期: 2026-03-25
# 更新日期: 2026-03-26
# 作者: 软件架构师
#
# 用途: 为EnhancedWeightedValidator提供动态可配置的评分权重
# 
# 权重规则:
# 1. 权重总和应为1.0（允许±10%误差，自动归一化）
# 2. 权重值范围: 0.0-1.0
# 3. 必须包含8个维度（V1.7版本新增知识点引用、逆向反馈维度）
#
# 维度说明（V1.7版本）:
# - word_count: 字数符合性（目标字数达标程度）- 8%
# - knowledge_reference: 知识点引用（知识库召回和引用）- 8%
# - outline: 大纲符合性（情节点覆盖度）- 13%
# - style: 风格一致性（语言风格匹配度）- 19%
# - character: 人设一致性（人物行为符合设定）- 19%
# - worldview: 世界观一致性（设定冲突检测）- 12%
# - reverse_feedback: 逆向反馈（章节与设定一致性）- 11%
# - naturalness: 自然度（AI痕迹检测）- 10%
#
# 总计: 100%
#
# 修改权重后，系统会自动检测并热更新配置

version: "1.1"
updated_by: "软件架构师"
last_updated: "2026-03-26T13:15:00"

weights:
  # 字数符合性评分权重（8%）
  # 目标: 确保章节字数符合要求
  word_count: 0.08
  
  # 知识点引用评分权重（8%）
  # 目标: 验证生成内容正确引用知识库知识点
  # 新增: V1.7版本新增维度，对应知识库功能
  knowledge_reference: 0.08
  
  # 大纲符合性评分权重（13%）
  # 目标: 确保情节发展符合大纲设定
  outline: 0.13
  
  # 风格一致性评分权重（19%）
  # 目标: 确保语言风格与学习的作品风格一致
  style: 0.19
  
  # 人设一致性评分权重（19%）
  # 目标: 确保人物行为符合性格设定
  character: 0.19
  
  # 世界观一致性评分权重（12%）
  # 目标: 确保不违背世界观设定
  worldview: 0.12
  
  # 逆向反馈评分权重（11%）
  # 目标: 检查章节与已设定内容的一致性（上下文衔接）
  # 新增: V1.7版本新增维度，对应逆向反馈功能
  reverse_feedback: 0.11
  
  # 自然度评分权重（10%）
  # 目标: 降低AI痕迹，提升文本自然度
  naturalness: 0.10

# 权重总和: 1.00（无需归一化）

# ============================================================================
# 配置预设（供参考，不参与实际计算）
# ============================================================================

# 预设1: 强调风格和人设（适合人物驱动的小说）
# style: 0.25, character: 0.25, worldview: 0.10, outline: 0.10,
# word_count: 0.05, knowledge_reference: 0.05, reverse_feedback: 0.10, naturalness: 0.10

# 预设2: 强调世界观和知识库（适合科幻/玄幻小说）
# worldview: 0.15, knowledge_reference: 0.12, reverse_feedback: 0.12, style: 0.15, character: 0.15,
# outline: 0.11, word_count: 0.08, naturalness: 0.12

# 预设3: 平衡型（默认配置）
# word_count: 0.08, knowledge_reference: 0.08, outline: 0.13, style: 0.19,
# character: 0.19, worldview: 0.12, reverse_feedback: 0.11, naturalness: 0.10

